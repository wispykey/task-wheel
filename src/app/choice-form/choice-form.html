<form [formGroup]="form" (ngSubmit)="submitForm()">
    <label for="newChoice">Choice</label>
    <input id="newChoice" type="text" formControlName="newChoice" />
    @for (choice of choiceControls.controls; track $index) {
    <app-choice-row [choiceControls]="choice" (remove)="removeChoice($index)" />
    }
</form>
